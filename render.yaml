services:
  # Backend FastAPI
  - type: web
    name: baby-cry-insight-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend static (built and served)
  - type: web
    name: baby-cry-insight-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://baby-cry-insight-backend.onrender.com # Placeholder
